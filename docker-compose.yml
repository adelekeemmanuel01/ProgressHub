services:
  db:
    image: postgres:latest
    container_name: postgres_db_tracker
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: myTaskTracker
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: adelekeemmanuel29@gmail.com
      PGADMIN_DEFAULT_PASSWORD: skyice14
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: